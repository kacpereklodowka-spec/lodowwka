<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MUALA MAP</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="header">
      <h2>🍔 MUALA MAP</h2>
      <p>Książulo tracker</p>
    </div>

    <input id="search" placeholder="Szukaj restauracji, miasta..." />

    <div class="filters">
      <button class="chip active" data-filter="all">Wszystkie</button>
      <button class="chip" data-filter="muala">MUALA 🔥</button>
    </div>

    <div id="list"></div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

</div>

<script src="script.js"></script>
</body>
</html>
