<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MUALA MAP PRO</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div id="app">

  <!-- LEFT PANEL -->
  <div id="sidebar">

    <div class="top">
      <h2>🍔 MUALA MAP</h2>
      <input id="search" placeholder="Szukaj (burger, kebab, miasto...)" />
    </div>

    <div class="filters">
      <button class="chip active" data-filter="all">Wszystkie</button>
      <button class="chip" data-filter="muala">🔥 MUALA</button>
    </div>

    <div id="list"></div>
  </div>

  <!-- DETAILS PANEL -->
  <div id="details" class="hidden">
    <div id="detailsContent"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<script src="script.js"></script>
</body>
</html>
